<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pro Dashboard</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<section class="section">
<div class="container">
<h1 class="section-title">Pro Dashboard</h1>
<p class="contact-text">Advanced automation, payment tools, stronger CRM and reporting.</p>
<div class="features-grid">
<div class="feature-box"><h3>Automation</h3><p>Email and SMS workflow tools.</p></div>
<div class="feature-box"><h3>Payments</h3><p>Stripe billing and recurring revenue tools.</p></div>
<div class="feature-box"><h3>Reporting</h3><p>Performance and lead tracking.</p></div>
</div>
</div>
</section>

<script>
(async function () {
const email = localStorage.getItem('customerEmail');
const res = await fetch(`/api/payments/access?email=${encodeURIComponent(email || '')}&plan=pro`);
const data = await res.json();
if (!data.allowed) {
alert('Your Pro access is not active for this account.');
window.location.href = '/';
}
})();
</script>
</body>
</html>
