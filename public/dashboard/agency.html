<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agency Dashboard</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<section class="section">
<div class="container">
<h1 class="section-title">Agency Dashboard</h1>
<p class="contact-text">White-label tools, multi-client systems, priority support, and scaling controls.</p>
<div class="features-grid">
<div class="feature-box"><h3>White Label</h3><p>Brand-ready client systems and templates.</p></div>
<div class="feature-box"><h3>Multi-Client</h3><p>Client management and advanced workflows.</p></div>
<div class="feature-box"><h3>Priority Support</h3><p>Top-tier service and strategic guidance.</p></div>
</div>
</div>
</section>

<script>
(async function () {
const email = localStorage.getItem('customerEmail');
const res = await fetch(`/api/payments/access?email=${encodeURIComponent(email || '')}&plan=agency`);
const data = await res.json();
if (!data.allowed) {
alert('Your Agency access is not active for this account.');
window.location.href = '/';
}
})();
</script>
</body>
</html>
