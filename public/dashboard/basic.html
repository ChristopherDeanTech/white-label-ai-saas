<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Basic Dashboard</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<section class="section">
<div class="container">
<h1 class="section-title">Basic Dashboard</h1>
<p class="contact-text">Website essentials, lead capture, booking setup, and support.</p>
<div class="features-grid">
<div class="feature-box"><h3>Lead Capture</h3><p>Basic forms and inquiry handling.</p></div>
<div class="feature-box"><h3>Booking Tools</h3><p>Calendar and appointment access.</p></div>
<div class="feature-box"><h3>Support</h3><p>Email support and monthly maintenance.</p></div>
</div>
</div>
</section>

<script>
(async function () {
const email = localStorage.getItem('customerEmail');
const res = await fetch(`/api/payments/access?email=${encodeURIComponent(email || '')}&plan=basic`);
const data = await res.json();
if (!data.allowed) {
alert('Your Basic access is not active yet.');
window.location.href = '/';
}
})();
</script>
</body>
</html>
