<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Us</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header class="site-header">
<nav class="nav container">
<a href="/" class="brand">Your Brand</a>
<div class="nav-links">
<a href="/">Home</a>
<a href="/contact">Contact</a>
</div>
</nav>
</header>

<main class="section">
<div class="container" style="max-width: 900px;">
<div class="cta-box">
<p class="eyebrow">Contact Us</p>
<h1 class="section-title">Let’s talk about your project</h1>
<p class="section-subtitle">
Fill out the form below and your information will be sent to our HubSpot CRM.
</p>

<form id="hubspotLeadForm" class="contact-form mt-3">
<div class="grid grid-2">
<div>
<label for="firstname">First Name</label>
<input type="text" id="firstname" name="firstname" required />
</div>

<div>
<label for="lastname">Last Name</label>
<input type="text" id="lastname" name="lastname" required />
</div>
</div>

<div class="grid grid-2 mt-2">
<div>
<label for="email">Email</label>
<input type="email" id="email" name="email" required />
</div>

<div>
<label for="phone">Phone</label>
<input type="text" id="phone" name="phone" />
</div>
</div>

<div class="grid grid-2 mt-2">
<div>
<label for="company">Company</label>
<input type="text" id="company" name="company" />
</div>

<div>
<label for="website">Website</label>
<input type="text" id="website" name="website" />
</div>
</div>

<div class="mt-2">
<label for="message">Message</label>
<textarea id="message" name="message" placeholder="Tell us what you need..."></textarea>
</div>

<div class="mt-3">
<button type="submit" class="btn btn-primary">Send Message</button>
</div>

<p id="formStatus" class="mt-2"></p>
</form>
</div>
</div>
</main>

<script src="/js/hubspot-form.js"></script>
</body>
</html>
